name: CMake

on:
  push:
    branches: [ "master", "id-*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

env:
  FEED_URL: https://nuget.pkg.github.com/${{github.repository_owner}}/index.json

jobs:
  html-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true

    - name: Install System Dependencies
      run: |
        ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh
        sudo apt-get update
        sudo apt-get install libx11-dev
        sudo apt-get install mono-complete

    - name: Add NuGet sources
      shell: bash
      run: |
        mono `./vcpkg/vcpkg fetch nuget | tail -n 1` \
          sources add \
          -Source "${{env.FEED_URL}}" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{github.repository_owner}}" \
          -Password "${{secrets.GH_PACKAGES_TOKEN}}"
        mono `./vcpkg/vcpkg fetch nuget | tail -n 1` \
          setapikey "${{secrets.GH_PACKAGES_TOKEN}}" \
          -Source "${{env.FEED_URL}}"

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Run Workflow
      env: 
        VCPKG_BINARY_SOURCES: "clear;nuget,${{env.FEED_URL}},readwrite"
      run: |
        cmake --version
        cmake --workflow --preset ci-html-docs

    - name: Setup ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7

    - name: Setup AsciiDoctor
      uses: reitzig/actions-asciidoctor@fc32dc82a65a0e93b67383531d4c68cec34c7f27 # v2.0.4
      with:
        version: 2.0.18

    - name: Run AsciiDoctor
      run: |
        asciidoctor --version
        asciidoctor build-ci-html-docs/hc/src/id.adoc

    - name: Upload HTML artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-html-docs/hc/src/id.html

  build:
    needs: html-docs
    strategy:
      matrix:
        preset: [ debug, release ]
        # macos-latest is disabled for now
        os: [ ubuntu-latest, windows-latest ]
        include:
          #- os: macos-latest
          #  nuget: mono `./vcpkg/vcpkg fetch nuget | tail -n 1`
          - os: ubuntu-latest
            nuget: mono `./vcpkg/vcpkg fetch nuget | tail -n 1`
          - os: windows-latest
            nuget: nuget

    runs-on: ${{matrix.os}}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true

    - name: Install Prerequisites Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      shell: bash
      run: |
        ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh
        sudo apt-get update
        sudo apt-get install libx11-dev mono-complete

    #- name: Install Prerequisites macOS
    #  if: ${{matrix.os == 'macos-latest'}}
    #  shell: bash
    #  run: |
    #    ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh

    - name: Add NuGet sources
      shell: bash
      run: |
        ${{matrix.nuget}} \
          sources add \
          -Source "${{env.FEED_URL}}" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{github.repository_owner}}" \
          -Password "${{secrets.GH_PACKAGES_TOKEN}}"
        ${{matrix.nuget}} \
          setapikey "${{secrets.GH_PACKAGES_TOKEN}}" \
          -Source "${{env.FEED_URL}}"

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Get HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs

    - name: Run Workflow
      env: 
        VCPKG_BINARY_SOURCES: "clear;nuget,${{env.FEED_URL}},readwrite"
      run: cmake --workflow --preset ci-${{matrix.preset}}

    - name: Build Setup package
      if: ${{matrix.os == 'windows-latest'}}
      run: cmake --build --preset ci-${{matrix.preset}} --target setup

    - name: Upload setup package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-latest' && matrix.preset == 'release'}}
      with:
        archive: false
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*-Setup.exe
        compression-level: 0

    - name: Upload msi package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-latest' && matrix.preset == 'release'}}
      with:
        archive: false
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.msi
        compression-level: 0

    - name: Upload zip package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-latest' && matrix.preset == 'release'}}
      with:
        archive: false
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.zip
        compression-level: 0

    - name: Upload tar.gz package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'ubuntu-latest' && matrix.preset == 'release'}}
      with:
        archive: false
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.tar.gz
        compression-level: 0

  # When a tag is pushed, create a draft release from the build assets
  release:
    if: ${{github.event_name == 'push' && github.ref_type == 'tag'}}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*"
          merge-multiple: true
          skip-decompress: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{github.token}}
          TAG: ${{github.ref_name}}
        run: |
          ls -lR release-assets
          gh release create "$TAG" \
            release-assets/* \
            --draft \
            --title "$TAG" \
            --notes-from-tag

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Install System Dependencies
        run: |
          ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh
          sudo apt-get update
          sudo apt-get install libx11-dev mono-complete

      - name: Add NuGet sources
        shell: bash
        run: |
          mono `./vcpkg/vcpkg fetch nuget | tail -n 1` \
            sources add \
            -Source "${{env.FEED_URL}}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{github.repository_owner}}" \
            -Password "${{secrets.GH_PACKAGES_TOKEN}}"
          mono `./vcpkg/vcpkg fetch nuget | tail -n 1` \
            setapikey "${{secrets.GH_PACKAGES_TOKEN}}" \
            -Source "${{env.FEED_URL}}"

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          cmake-version: '3.31'

      - name: Configure Compilation Database
        env: 
          VCPKG_BINARY_SOURCES: "clear;nuget,${{env.FEED_URL}},readwrite"
        run: |
          cmake --version
          cmake --preset cppcheck
  
      - name: Run CppCheck
        uses: deep5050/cppcheck-action@b4d7c69b911c24817691b4b210586568a858b4c5 # v3.0
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          enable: 'style'
          force: 'enable'
          other_options: >-
            --suppress=commaSeparatedReturn
            --suppress=cstyleCast
            --suppress=functionConst
            --suppress=functionStatic
            --suppress=incorrectStringBooleanError
            --suppress=invalidPointerCast
            --suppress=invalidscanf
            --suppress=variableHidingEnum
            --suppress=variableScope
            --inline-suppr
            -I headers hc common headers unix win32
            -ifractint
            -ivcpkg
            -i../build-cppcheck/vcpkg_installed

      - name: Print Report
        run: cmake -E cat cppcheck_report.txt

name: analysis

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  #############################################################################
  msvc-static-analysis:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          cmake-version: '3.31'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Setup vcpkg package cache
        id: vc
        uses: LegalizeAdulthood/vcpkg-github-cache@57e80dee31103a4426cb55b0d6d27d7d56117d4c # v1.4.0
        with:
          token: ${{github.token}}
          bootstrap: "true"
          install-nuget: "true"
          debug: "false"
          trace: "false"

      - name: Configure CMake for Static Analysis
        shell: pwsh
        run: |
          cmake --version 2>&1 |
            Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          cmake --preset ci-debug 2>&1 |
            Tee-Object -FilePath build.log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Run Static Analysis
        continue-on-error: true
        run: |
          msbuild build-ci-debug/ALL_BUILD.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:EnableClangTidyCodeAnalysis=false /p:RunCodeAnalysis=true /p:CodeAnalysisRuleSet=NativeRecommendedRules.ruleset /p:TreatWarningsAsErrors=false /v:q "/flp:logfile=msvc-static-analysis-report.txt;verbosity=q"

      - name: Analyze vcpkg package cache
        if: always()
        uses: LegalizeAdulthood/vcpkg-github-cache/analyze@57e80dee31103a4426cb55b0d6d27d7d56117d4c # v1.4.0
        with:
          token: ${{github.token}}
          build-log: build.log
          artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{github.run_attempt}}
          fail-on: "never"
          debug: "false"
          trace: "false"

      - name: Upload Static Analysis Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: msvc-static-analysis
          path: |
            msvc-static-analysis-report.txt

  #############################################################################
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true

      - name: Install System Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
          sudo dpkg-reconfigure man-db
          sudo apt-get update
          sed 's/#.*//' ${{github.workspace}}/.github/workflows/wx-requirements.txt | xargs sudo apt-get install 

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          cmake-version: '3.31'

      - name: Setup vcpkg package cache
        id: vc
        uses: LegalizeAdulthood/vcpkg-github-cache@57e80dee31103a4426cb55b0d6d27d7d56117d4c # v1.4.0
        with:
          token: ${{github.token}}
          bootstrap: "true"
          install-nuget: "true"
          debug: "false"
          trace: "false"

      - name: Configure Compilation Database
        shell: bash
        run: |
          set -e -o pipefail
          cmake --version 2>&1 | tee build.log
          cmake --preset cppcheck 2>&1 | tee -a build.log

      - name: Analyze vcpkg package cache
        if: always()
        uses: LegalizeAdulthood/vcpkg-github-cache/analyze@57e80dee31103a4426cb55b0d6d27d7d56117d4c # v1.4.0
        with:
          token: ${{github.token}}
          build-log: build.log
          artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{github.run_attempt}}
          fail-on: "never"
          debug: "false"
          trace: "false"

      - name: Run CppCheck
        uses: deep5050/cppcheck-action@b4d7c69b911c24817691b4b210586568a858b4c5 # v3.0
        with:
          github_token: ${{github.token}}
          enable: 'style'
          force: 'enable'
          other_options: >-
            --library=googletest
            --suppress=commaSeparatedReturn
            --suppress=cstyleCast
            --suppress=functionConst
            --suppress=functionStatic
            --suppress=incorrectStringBooleanError
            --suppress=invalidPointerCast
            --suppress=invalidscanf
            --suppress=variableHidingEnum
            --suppress=variableScope
            --inline-suppr
            -I libid/include
            -ilegacy
            -ivcpkg
            -i../build-cppcheck/vcpkg_installed
            hc helpcom libid win32 wx

      - name: Print Report
        run: cmake -E cat cppcheck_report.txt

      - name: Upload Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: CppCheck
          path: cppcheck_report.txt

  #############################################################################
  doxygen:
    name: doxygen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true

      - name: Install Doxygen
        run: |
          echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
          sudo dpkg-reconfigure man-db
          sudo apt-get update
          sed 's/#.*//' ${{github.workspace}}/.github/workflows/wx-requirements.txt | xargs sudo apt-get install 
          sudo apt-get install --no-install-recommends -y doxygen graphviz

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          cmake-version: '3.31'

      - name: Setup vcpkg package cache
        id: vc
        uses: LegalizeAdulthood/vcpkg-github-cache@57e80dee31103a4426cb55b0d6d27d7d56117d4c # v1.4.0
        with:
          token: ${{github.token}}
          bootstrap: "true"
          install-nuget: "true"
          debug: "false"
          trace: "false"

      - name: Configure Compilation Database
        shell: bash
        run: |
          set -e -o pipefail
          cmake --version 2>&1 | tee build.log
          cmake --preset cppcheck 2>&1 | tee -a build.log

      - name: Analyze vcpkg package cache
        if: always()
        uses: LegalizeAdulthood/vcpkg-github-cache/analyze@57e80dee31103a4426cb55b0d6d27d7d56117d4c # v1.4.0
        with:
          token: ${{github.token}}
          build-log: build.log
          artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{github.run_attempt}}
          fail-on: "never"
          debug: "false"
          trace: "false"

      - name: Get Project Version
        id: version
        run: |
          PROJECT_VERSION=$(grep -E "^\s*VERSION\s+[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+" CMakeLists.txt | sed -E 's/^\s*VERSION\s+([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "version=${PROJECT_VERSION}" >> $GITHUB_OUTPUT

      - name: Generate Documentation
        run: |
          # Replace version placeholder in Doxyfile
          sed "s/@PROJECT_VERSION@/${{steps.version.outputs.version}}/g" Doxyfile > Doxyfile.configured
          doxygen Doxyfile.configured

      - name: Upload Documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doxygen
          path: docs/html/

  #############################################################################
  gh-pages-dev:
    needs: [cppcheck, doxygen, msvc-static-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: gh-pages
          submodules: false

      - name: Get CppCheck Report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: CppCheck
          path: ${{ runner.temp }}/cppcheck

      - name: Get Doxygen Documentation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: doxygen
          path: ${{ runner.temp }}/doxygen

      - name: Get Static Anaysis Report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: msvc-static-analysis
          path: ${{ runner.temp }}/msvc-static-analysis

      - name: Publish Developer Reports
        run: |
          git config user.name github-pages
          git config user.email pages-bot@example.com

          for attempt in 1 2 3; do
            git fetch origin +refs/heads/gh-pages:refs/remotes/origin/gh-pages
            git checkout -B gh-pages-dev-update origin/gh-pages
            rm -rf dev/cppcheck dev/doxygen dev/msvc-static-analysis
            mkdir -p dev
            cp -R "${RUNNER_TEMP}/cppcheck" dev/cppcheck
            cp -R "${RUNNER_TEMP}/doxygen" dev/doxygen
            cp -R "${RUNNER_TEMP}/msvc-static-analysis" dev/msvc-static-analysis
            git add -A dev
            git status

            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "Update developer reports for ${{github.sha}}"
            git log -n 1

            git fetch origin +refs/heads/gh-pages:refs/remotes/origin/gh-pages
            if ! git rebase origin/gh-pages; then
              git rebase --abort || true
              sleep $((attempt * 5))
              continue
            fi

            if git push origin HEAD:gh-pages; then
              exit 0
            fi

            sleep $((attempt * 5))
          done

          exit 1

#
name: build

on:
  push:
    branches: [ "master", "develop", "id-*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "id-*" ]

permissions:
  contents: read

jobs:
  #############################################################################
  ascii-doc:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Setup ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7

    - name: Setup AsciiDoctor
      uses: reitzig/actions-asciidoctor@fc32dc82a65a0e93b67383531d4c68cec34c7f27 # v2.0.4
      with:
        version: 2.0.18

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Setup vcpkg package cache
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        bootstrap: "true"
        install-nuget: "true"
        debug: "false"
        trace: "false"

    - name: Run Workflow
      shell: pwsh
      run: |
        cmake --version
        cmake --workflow --preset ci-ascii-doc 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{github.run_attempt}}
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Copy images for AsciiDoc artifact
      run: |
        if [ -d "hc/src/images" ]; then
          mkdir -p build-ci-ascii-doc/hc/src/help/images
          cp -r hc/src/images/* build-ci-ascii-doc/hc/src/help/images/
        fi

    - name: Upload AsciiDoc artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ascii-doc
        path: |
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.adoc
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/help/images/

  #############################################################################
  pdf-docs:
    needs: ascii-doc
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get AsciiDoc artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ascii-doc
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/

    - name: Run AsciiDoctor PDF
      run: |
        docker run --rm \
          -v ${{github.workspace}}/build-ci-ascii-doc/hc/src:/documents \
          docker.io/asciidoctor/docker-asciidoctor:latest \
          asciidoctor-pdf \
          --require asciidoctor-mathematical \
          --attribute stem=asciimath \
          --attribute mathematical-format=svg \
          --attribute allow-uri-read \
          /documents/id.adoc

    - name: Upload PDF artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.pdf

  #############################################################################
  html-docs:
    needs: ascii-doc
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get AsciiDoc artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ascii-doc
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/

    - name: Setup ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7

    - name: Setup AsciiDoctor
      uses: reitzig/actions-asciidoctor@fc32dc82a65a0e93b67383531d4c68cec34c7f27 # v2.0.4
      with:
        version: 2.0.18

    - name: Run AsciiDoctor
      run: |
        asciidoctor --version
        asciidoctor build-ci-ascii-doc/hc/src/id.adoc

    - name: Upload HTML artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-docs
        path: |
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.html
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/help/images/

  #############################################################################
  master-docs:
    if: ${{github.event_name == 'push' && github.ref == 'refs/heads/master'}}
    needs: [ html-docs, pdf-docs ]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    concurrency:
      group: master-docs
      cancel-in-progress: false

    steps:
    - name: Download HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{ runner.temp }}/html-docs

    - name: Download PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{ runner.temp }}/pdf-docs

    - name: Checkout Pages
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: gh-pages
        submodules: false
        path: pages

    - name: Publish Master Documentation
      working-directory: pages
      run: |
        git config user.name github-pages
        git config user.email pages-bot@example.com

        test -f "${RUNNER_TEMP}/html-docs/id.html"
        test -f "${RUNNER_TEMP}/pdf-docs/id.pdf"

        for attempt in 1 2 3; do
          git fetch origin +refs/heads/gh-pages:refs/remotes/origin/gh-pages
          git checkout -B gh-pages-master-update origin/gh-pages
          rm -rf master
          install -D "${RUNNER_TEMP}/html-docs/id.html" master/index.html
          install -D "${RUNNER_TEMP}/pdf-docs/id.pdf" master/id.pdf
          if [ -d "${RUNNER_TEMP}/html-docs/help" ]; then
            cp -R "${RUNNER_TEMP}/html-docs/help" master/help
          fi
          git add -A master
          git status

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Publish master online documentation"
          git log -n 1

          git fetch origin +refs/heads/gh-pages:refs/remotes/origin/gh-pages
          if ! git rebase origin/gh-pages; then
            git rebase --abort || true
            sleep $((attempt * 5))
            continue
          fi

          if git push origin HEAD:gh-pages; then
            exit 0
          fi

          sleep $((attempt * 5))
        done

        exit 1

  #############################################################################
  wx-changes:
    runs-on: ubuntu-22.04
    outputs:
      run-wx: ${{steps.changed_files.outputs.run-wx}}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: false

    - name: Check for wx changes
      id: changed_files
      env:
        BEFORE: ${{github.event.before}}
        HEAD: ${{github.sha}}
        PR_BASE: ${{github.event.pull_request.base.sha}}
        REF_TYPE: ${{github.ref_type}}
      run: |
        run_wx=false
        mode=tag
        base=""
        changed_files=""
        include_roots=(
          wx
          wx/include
          libid/include
          config/include
          algos/include
          helpcom/include
          hc
        )

        resolve_include() {
          local source="$1"
          local include="$2"
          local source_dir
          local root
          local candidate
          source_dir="$(dirname "$source")"
          for candidate in "$source_dir/$include"; do
            candidate="$(printf "%s\n" "$candidate" | sed "s#^\./##;s#//*#/#g")"
            if git cat-file -e "$HEAD:$candidate" 2>/dev/null; then
              printf "%s\n" "$candidate"
              return 0
            fi
          done
          for root in "${include_roots[@]}"; do
            candidate="$root/$include"
            candidate="$(printf "%s\n" "$candidate" | sed "s#^\./##;s#//*#/#g")"
            if git cat-file -e "$HEAD:$candidate" 2>/dev/null; then
              printf "%s\n" "$candidate"
              return 0
            fi
          done
          return 1
        }

        collect_headers_for() {
          local source="$1"
          local includes
          local include
          local header
          includes="$(git show "$HEAD:$source" 2>/dev/null |
            sed -n 's/^[[:space:]]*#[[:space:]]*include[[:space:]]*[<"]\([^>"]*\)[>"].*/\1/p' ||
            true)"
          while IFS= read -r include; do
            if [ -z "$include" ]; then
              continue
            fi
            header="$(resolve_include "$source" "$include" || true)"
            if [ -n "$header" ] && ! grep -Fxq "$header" "$wx_header_list"; then
              printf "%s\n" "$header" >> "$wx_header_list"
              collect_headers_for "$header"
            fi
          done <<< "$includes"
        }

        collect_wx_headers() {
          local source
          local wx_sources
          wx_header_list="$(mktemp)"
          wx_sources="$(git ls-tree -r --name-only "$HEAD" wx |
            grep -E '^wx/[^/]+[.]cpp$' ||
            true)"
          while IFS= read -r source; do
            if [ -n "$source" ]; then
              collect_headers_for "$source"
            fi
          done <<< "$wx_sources"
          sort -u "$wx_header_list"
        }

        if [ "$REF_TYPE" != "tag" ]; then
          mode=diff
          base="$BEFORE"
          if [ -n "$PR_BASE" ]; then
            base="$PR_BASE"
            mode=pull-request
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            mode=full-tree
            changed_files="$(git ls-tree -r --name-only "$HEAD")"
          elif git cat-file -e "$base^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$base" "$HEAD")"
          else
            mode=missing-base
            echo "::warning::Base commit $base is unavailable; assuming wx changed"
            run_wx=true
          fi
          if [ "$run_wx" != "true" ]; then
            wx_headers="$(collect_wx_headers)"
            wx_header_count="$(printf "%s\n" "$wx_headers" | sed '/^$/d' | wc -l)"
            echo "wx-changes header-count=$wx_header_count"
            for path in $changed_files; do
              case "$path" in
                wx/*)
                  echo "wx-changes matched-wx-path=$path"
                  run_wx=true
                  break
                  ;;
                .github/workflows/wx-requirements.txt)
                  echo "wx-changes matched-wx-requirements=$path"
                  run_wx=true
                  break
                  ;;
              esac
              if printf "%s\n" "$wx_headers" | grep -Fxq "$path"; then
                echo "wx-changes matched-wx-header=$path"
                run_wx=true
                break
              fi
              if git grep -q "ID_USE_WX" "$HEAD" -- "$path" 2>/dev/null; then
                echo "wx-changes matched-head-id-use-wx=$path"
                run_wx=true
                break
              fi
              if [ -n "$base" ] && ! [[ "$base" =~ ^0+$ ]] &&
                  git grep -q "ID_USE_WX" "$base" -- "$path" 2>/dev/null; then
                echo "wx-changes matched-base-id-use-wx=$path"
                run_wx=true
                break
              fi
            done
          fi
        fi
        echo "wx-changes base=$base"
        echo "wx-changes head=$HEAD"
        echo "wx-changes mode=$mode"
        echo "wx-changes run-wx=$run_wx"
        echo "<h3>Build wx: $run_wx</h3>" >> "$GITHUB_STEP_SUMMARY"
        echo "run-wx=$run_wx" >> "$GITHUB_OUTPUT"

  #############################################################################
  build:
    needs: [ html-docs, pdf-docs ]
    strategy:
      fail-fast: true
      matrix:
        include:
        - os: ubuntu-22.04
          preset: debug
        - os: ubuntu-22.04
          preset: release
        - os: windows-2022
          preset: debug
        - os: windows-2022
          preset: release
        - os: macos-latest
          preset: release
        - os: macos-15-intel
          preset: release

    runs-on: ${{matrix.os}}
    permissions:
      actions: write
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get prebuilt HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Get prebuilt PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Verify prebuilt documentation
      run: >
        cmake -E sha256sum
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.html
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.pdf

    - name: Install Prerequisites Linux
      if: ${{matrix.os == 'ubuntu-22.04'}}
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
        sudo dpkg-reconfigure man-db
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y libx11-dev xauth xvfb

    - name: Install Prerequisites macOS
      if: ${{startsWith(matrix.os, 'macos-')}}
      shell: bash
      run: |
        brew install autoconf automake libtool pkg-config
        brew install --cask xquartz

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Setup vcpkg package cache
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        bootstrap: "true"
        install-nuget: "true"
        debug: "false"
        trace: "false"

    - name: Run Workflow Linux
      if: ${{matrix.os == 'ubuntu-22.04'}}
      shell: pwsh
      run: |
        xvfb-run -a cmake --workflow --preset ci-${{matrix.preset}} 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Run Workflow Windows
      if: ${{matrix.os == 'windows-2022'}}
      shell: pwsh
      run: |
        cmake --workflow --preset ci-${{matrix.preset}} 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Run Workflow macOS
      if: ${{startsWith(matrix.os, 'macos-')}}
      shell: bash
      run: |
        set -o pipefail
        /opt/X11/bin/Xvfb :99 -screen 0 1024x768x24 >xvfb.log 2>&1 &
        xvfb_pid=$!
        cleanup() {
          status=$?
          kill "$xvfb_pid" || true
          if [ "$status" -ne 0 ]; then
            cat xvfb.log || true
          fi
          exit "$status"
        }
        trap cleanup EXIT
        sleep 3
        ps -p "$xvfb_pid"
        /opt/X11/bin/xdpyinfo -display :99
        DISPLAY=:99 cmake --workflow --preset ci-${{matrix.preset}} 2>&1 |
          tee build.log

    - name: Upload failed image test artifacts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: image-test-diagnostics-${{github.job}}-${{matrix.os}}-${{matrix.preset}}-${{github.run_attempt}}
        if-no-files-found: ignore
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/test-artifacts/

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{matrix.os}}-${{matrix.preset}}-${{github.run_attempt}}
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Build Setup package
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      run: cmake --build --preset ci-${{matrix.preset}} --target setup

    - name: Upload setup package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Setup-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*-Setup.exe
        if-no-files-found: error
        compression-level: 0

    - name: Upload msi package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Msi-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.msi
        if-no-files-found: error
        compression-level: 0

    - name: Upload zip package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Zip-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.zip
        if-no-files-found: error
        compression-level: 0

    - name: Upload tar.gz package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{!startsWith(matrix.os, 'windows-') && matrix.preset == 'release'}}
      with:
        archive: false
        name: Tar-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.tar.gz
        if-no-files-found: error
        compression-level: 0

    - name: Cancel workflow after build failure
      if: failure()
      env:
        GH_TOKEN: ${{github.token}}
      run: gh run cancel ${{github.run_id}} || true

  #############################################################################
  build-freebsd:
    needs: [ html-docs, pdf-docs ]
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get prebuilt HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-release/hc/src

    - name: Get prebuilt PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-release/hc/src

    - name: Verify prebuilt documentation
      run: >
        cmake -E sha256sum
        ${{github.workspace}}/build-ci-release/hc/src/id.html
        ${{github.workspace}}/build-ci-release/hc/src/id.pdf

    - name: Generate vcpkg cache setup script
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        execution-mode: emit-script
        target-os: freebsd
        bootstrap: "true"
        install-nuget: "true"
        install-mono: "true"
        debug: "false"
        trace: "false"

    - name: Run FreeBSD workflow
      uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636 # v1.4.8
      env:
        VCPKG_GITHUB_CACHE_TOKEN: ${{github.token}}
        VCPKG_ROOT: vcpkg
      with:
        release: "14.3"
        usesh: true
        sync: rsync
        copyback: true
        envs: VCPKG_GITHUB_CACHE_TOKEN VCPKG_ROOT
        prepare: |
          pkg update
          pkg install -y \
            autoconf \
            automake \
            bash \
            bison \
            cmake \
            curl \
            gettext-tools \
            git \
            gmake \
            libX11 \
            libtool \
            ninja \
            patchelf \
            perl5 \
            pkgconf \
            python3 \
            rsync \
            unzip \
            xauth \
            xorg-vfbserver \
            zip
        run: |
          set +e
          set -u
          mkdir -p .freebsd-copyback

          {
            status=0
            sh "${{steps.vc.outputs.setup-script}}" || status=$?
            if [ "${status}" -eq 0 ]; then
              . "${{steps.vc.outputs.setup-env}}" || status=$?
            fi
            if [ "${status}" -eq 0 ]; then
              test -f build-ci-release/hc/src/id.html &&
              test -f build-ci-release/hc/src/id.pdf &&
              cmake --version
              status=$?
            fi
            if [ "${status}" -eq 0 ]; then
              /usr/local/bin/Xvfb :99 -screen 0 1024x768x24 >xvfb.log 2>&1 &
              xvfb_pid=$!
              sleep 3
              DISPLAY=:99 cmake --workflow --preset ci-release
              status=$?
              kill "$xvfb_pid" || true
            fi
            echo "${status}" > build.status
          } 2>&1 | tee build.log

          cp build.log build.status .freebsd-copyback/
          if [ -f xvfb.log ]; then
            cp xvfb.log .freebsd-copyback/
          fi
          find . -mindepth 1 -maxdepth 1 ! -name .git \
            ! -name .freebsd-copyback -exec rm -rf {} +
          mv .freebsd-copyback/* .
          rmdir .freebsd-copyback

    # TODO: Copy CPack artifacts back out of the FreeBSD VM and upload them.

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{github.run_attempt}}
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Check FreeBSD build status
      if: always()
      run: |
        if [ ! -f build.status ]; then
          echo "build.status was not copied back from the FreeBSD VM"
          exit 1
        fi
        exit "$(cat build.status)"

    - name: Cancel workflow after FreeBSD build failure
      if: failure()
      env:
        GH_TOKEN: ${{github.token}}
      run: gh run cancel ${{github.run_id}} || true

  #############################################################################
  # When a tag is pushed, create a draft release from the build assets
  release:
    if: ${{github.event_name == 'push' && github.ref_type == 'tag'}}
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download setup package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*-Setup.exe"
          merge-multiple: true
          skip-decompress: true

      - name: Download msi package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.msi"
          merge-multiple: true
          skip-decompress: true

      - name: Download tar.gz package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.tar.gz"
          merge-multiple: true
          skip-decompress: true

      - name: Download zip package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.zip"
          merge-multiple: true
          skip-decompress: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{github.token}}
          TAG: ${{github.ref_name}}
        run: |
          ls -lR release-assets
          compgen -G "release-assets/*-Setup.exe" > /dev/null
          compgen -G "release-assets/*.msi" > /dev/null
          compgen -G "release-assets/*.tar.gz" > /dev/null
          compgen -G "release-assets/*.zip" > /dev/null
          gh release create "$TAG" \
            release-assets/* \
            --draft \
            --title "Version $TAG" \
            --notes-from-tag

  #############################################################################
  wx:
    if: ${{needs.wx-changes.outputs.run-wx == 'true'}}
    needs: [ html-docs, pdf-docs, wx-changes ]
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2022, macos-latest ]

    runs-on: ${{matrix.os}}
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get prebuilt HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-wx-release/hc/src

    - name: Get prebuilt PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-wx-release/hc/src

    - name: Verify prebuilt documentation
      run: >
        cmake -E sha256sum
        ${{github.workspace}}/build-ci-wx-release/hc/src/id.html
        ${{github.workspace}}/build-ci-wx-release/hc/src/id.pdf

    - name: Install Prerequisites Linux
      if: ${{matrix.os == 'ubuntu-22.04'}}
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
        sudo dpkg-reconfigure man-db
        sudo apt-get update
        sed 's/#.*//' ${{github.workspace}}/.github/workflows/wx-requirements.txt | xargs sudo apt-get install 

    - name: Install Prerequisites macOS
      if: ${{startsWith(matrix.os, 'macos-')}}
      shell: bash
      run: |
        brew install autoconf automake libtool pkg-config

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Setup vcpkg package cache
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        bootstrap: "true"
        install-nuget: "true"
        debug: "false"
        trace: "false"

    - name: Run Workflow
      shell: pwsh
      run: |
        cmake --workflow --preset ci-wx-release 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@61ad6626abf2cf9e92ea53078c695dbfb0ad6e8d # v1.3.0
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{matrix.os}}-wx-release-${{github.run_attempt}}
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Build Setup package
      if: ${{matrix.os == 'windows-2022'}}
      run: cmake --build --preset ci-wx-release --target setup


name: build

on:
  push:
    branches: [ "master", "develop", "id-*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "id-*" ]

permissions:
  contents: write

env:
  FEED_URL: https://nuget.pkg.github.com/${{github.repository_owner}}/index.json

jobs:
  #############################################################################
  ascii-doc:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Install System Dependencies for building AsciiDoc
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh
        echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
        sudo dpkg-reconfigure man-db
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y mono-complete

    - name: Add NuGet sources
      shell: bash
      run: |
        mono `./vcpkg/vcpkg fetch nuget | tail -n 1` \
          sources add \
          -Source "${{env.FEED_URL}}" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{github.repository_owner}}" \
          -Password "${{secrets.GH_PACKAGES_TOKEN}}"
        mono `./vcpkg/vcpkg fetch nuget | tail -n 1` \
          setapikey "${{secrets.GH_PACKAGES_TOKEN}}" \
          -Source "${{env.FEED_URL}}"

    - name: Setup ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7

    - name: Setup AsciiDoctor
      uses: reitzig/actions-asciidoctor@fc32dc82a65a0e93b67383531d4c68cec34c7f27 # v2.0.4
      with:
        version: 2.0.18

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Run Workflow
      env: 
        VCPKG_BINARY_SOURCES: "clear;nuget,${{env.FEED_URL}},readwrite"
      run: |
        cmake --version
        cmake --workflow --preset ci-ascii-doc

    - name: Copy images for AsciiDoc artifact
      run: |
        if [ -d "hc/src/images" ]; then
          mkdir -p build-ci-ascii-doc/hc/src/help/images
          cp -r hc/src/images/* build-ci-ascii-doc/hc/src/help/images/
        fi

    - name: Upload AsciiDoc artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ascii-doc
        path: |
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.adoc
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/help/images/

  #############################################################################
  pdf-docs:
    needs: ascii-doc
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get AsciiDoc artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ascii-doc
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/

    - name: Run AsciiDoctor PDF
      run: |
        docker run --rm \
          -v ${{github.workspace}}/build-ci-ascii-doc/hc/src:/documents \
          docker.io/asciidoctor/docker-asciidoctor:latest \
          asciidoctor-pdf \
          --require asciidoctor-mathematical \
          --attribute stem=asciimath \
          --attribute mathematical-format=svg \
          --attribute allow-uri-read \
          /documents/id.adoc

    - name: Upload PDF artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.pdf

  #############################################################################
  html-docs:
    needs: ascii-doc
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get AsciiDoc artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ascii-doc
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/

    - name: Setup ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7

    - name: Setup AsciiDoctor
      uses: reitzig/actions-asciidoctor@fc32dc82a65a0e93b67383531d4c68cec34c7f27 # v2.0.4
      with:
        version: 2.0.18

    - name: Run AsciiDoctor
      run: |
        asciidoctor --version
        asciidoctor build-ci-ascii-doc/hc/src/id.adoc

    - name: Upload HTML artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-docs
        path: |
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.html
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/help/images/

  #############################################################################
  master-docs:
    if: ${{github.event_name == 'push' && github.ref == 'refs/heads/master'}}
    needs: [ html-docs, pdf-docs ]
    runs-on: ubuntu-latest
    concurrency:
      group: master-docs
      cancel-in-progress: false

    steps:
    - name: Download HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: docs/html

    - name: Download PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: docs/pdf

    - name: Checkout Pages
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: gh-pages
        submodules: false
        path: pages

    - name: Publish Master Documentation
      run: |
        test -f docs/html/id.html
        test -f docs/pdf/id.pdf
        rm -rf pages/master
        install -D docs/html/id.html pages/master/index.html
        install -D docs/pdf/id.pdf pages/master/id.pdf
        if [ -d docs/html/help ]; then
          cp -R docs/html/help pages/master/help
        fi

    - name: Update Contents
      working-directory: pages
      run: |
        git config user.name github-pages
        git config user.email pages-bot@example.com
        git add -A .
        git status
        git commit -m "Publish master online documentation" || echo "No changes to commit"
        git log -n 1

    - name: Push Updates
      working-directory: pages
      run: git push origin gh-pages

  #############################################################################
  wx_changes:
    runs-on: ubuntu-latest
    outputs:
      run_wx: ${{steps.changed_files.outputs.run_wx}}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: false

    - name: Check for wx changes
      id: changed_files
      env:
        BEFORE: ${{github.event.before}}
        HEAD: ${{github.sha}}
        PR_BASE: ${{github.event.pull_request.base.sha}}
        REF_TYPE: ${{github.ref_type}}
      run: |
        run_wx=false
        if [ "$REF_TYPE" != "tag" ]; then
          base="$BEFORE"
          if [ -n "$PR_BASE" ]; then
            base="$PR_BASE"
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            changed_files="$(git ls-tree -r --name-only "$HEAD")"
          else
            changed_files="$(git diff --name-only "$base" "$HEAD")"
          fi
          for path in $changed_files; do
            case "$path" in
              wx/*)
                run_wx=true
                break
                ;;
            esac
            if git grep -q "ID_USE_WX" "$HEAD" -- "$path" 2>/dev/null; then
              run_wx=true
              break
            fi
            if [ -n "$base" ] && ! [[ "$base" =~ ^0+$ ]] &&
                git grep -q "ID_USE_WX" "$base" -- "$path" 2>/dev/null; then
              run_wx=true
              break
            fi
          done
        fi
        echo "run_wx=$run_wx" >> "$GITHUB_OUTPUT"

  #############################################################################
  build:
    needs: [ html-docs, pdf-docs ]
    strategy:
      matrix:
        preset: [ debug, release ]
        # macos-latest is disabled for now
        os: [ ubuntu-latest, windows-2022 ]
        include:
          #- os: macos-latest
          #  nuget: mono `./vcpkg/vcpkg fetch nuget | tail -n 1`
          - os: ubuntu-latest
            nuget: mono `./vcpkg/vcpkg fetch nuget | tail -n 1`
          - os: windows-2022
            nuget: nuget

    runs-on: ${{matrix.os}}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get prebuilt HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Get prebuilt PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Install Prerequisites Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh
        echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
        sudo dpkg-reconfigure man-db
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y mono-complete libx11-dev xauth xvfb

    #- name: Install Prerequisites macOS
    #  if: ${{matrix.os == 'macos-latest'}}
    #  shell: bash
    #  run: |
    #    ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh

    - name: Add NuGet sources
      shell: bash
      run: |
        ${{matrix.nuget}} \
          sources add \
          -Source "${{env.FEED_URL}}" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{github.repository_owner}}" \
          -Password "${{secrets.GH_PACKAGES_TOKEN}}"
        ${{matrix.nuget}} \
          setapikey "${{secrets.GH_PACKAGES_TOKEN}}" \
          -Source "${{env.FEED_URL}}"

    - name: Inspect NuGet binary cache setup Windows
      if: ${{matrix.os == 'windows-2022'}}
      shell: cmd
      env:
        TOKEN: ${{secrets.GH_PACKAGES_TOKEN}}
      run: |
        @echo off
        echo runner os: %RUNNER_OS%
        echo image os: %ImageOS%
        echo image version: %ImageVersion%
        echo github event: ${{github.event_name}}
        echo github repository: ${{github.repository}}
        echo github ref: ${{github.ref}}
        echo package feed: %FEED_URL%
        if "%TOKEN%"=="" (
          echo GH_PACKAGES_TOKEN: empty
        ) else (
          echo GH_PACKAGES_TOKEN: present
        )
        echo.
        echo cmake from PATH:
        where cmake
        cmake --version
        echo.
        echo vcpkg submodule:
        git submodule status vcpkg
        vcpkg\vcpkg version
        echo.
        echo nuget from PATH:
        where nuget
        nuget help | findstr /I /C:"NuGet Version"
        echo.
        echo nuget used by vcpkg:
        for /f "usebackq delims=" %%i in (`vcpkg\vcpkg fetch nuget`) do set VCPKG_NUGET=%%i
        echo %VCPKG_NUGET%
        "%VCPKG_NUGET%" help | findstr /I /C:"NuGet Version"
        echo.
        echo nuget locals from PATH nuget:
        nuget locals all -list
        echo.
        echo nuget locals from vcpkg nuget:
        "%VCPKG_NUGET%" locals all -list
        echo.
        echo sources from PATH nuget:
        nuget sources list -Format Detailed
        echo.
        echo sources from vcpkg nuget:
        "%VCPKG_NUGET%" sources list -Format Detailed
        echo.
        echo sanitized NuGet config files:
        if exist "%APPDATA%\NuGet\NuGet.Config" (
          echo %APPDATA%\NuGet\NuGet.Config
          findstr /V /I /C:"Password" /C:"apikey" "%APPDATA%\NuGet\NuGet.Config"
        )
        if exist "%USERPROFILE%\.nuget\NuGet\NuGet.Config" (
          echo %USERPROFILE%\.nuget\NuGet\NuGet.Config
          findstr /V /I /C:"Password" /C:"apikey" "%USERPROFILE%\.nuget\NuGet\NuGet.Config"
        )
        echo.
        echo feed probe with basic auth:
        curl.exe -sS -D "%RUNNER_TEMP%\feed-basic-headers.txt" -o "%RUNNER_TEMP%\feed-basic.json" -w "feed basic http status: %%{http_code}\n" -u "${{github.repository_owner}}:%TOKEN%" "%FEED_URL%"
        if exist "%RUNNER_TEMP%\feed-basic-headers.txt" type "%RUNNER_TEMP%\feed-basic-headers.txt"
        if exist "%RUNNER_TEMP%\feed-basic.json" for %%F in ("%RUNNER_TEMP%\feed-basic.json") do echo feed basic bytes: %%~zF
        echo.
        echo feed probe with bearer auth:
        curl.exe -sS -D "%RUNNER_TEMP%\feed-bearer-headers.txt" -o "%RUNNER_TEMP%\feed-bearer.json" -w "feed bearer http status: %%{http_code}\n" -H "Authorization: Bearer %TOKEN%" "%FEED_URL%"
        if exist "%RUNNER_TEMP%\feed-bearer-headers.txt" type "%RUNNER_TEMP%\feed-bearer-headers.txt"
        if exist "%RUNNER_TEMP%\feed-bearer.json" for %%F in ("%RUNNER_TEMP%\feed-bearer.json") do echo feed bearer bytes: %%~zF
        echo.
        echo package list probe:
        "%VCPKG_NUGET%" list vcpkg-cmake-config -Source "%FEED_URL%" -NonInteractive -Verbosity detailed
        exit /b 0

    - name: Inspect NuGet binary cache setup Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      shell: bash
      env:
        TOKEN: ${{secrets.GH_PACKAGES_TOKEN}}
      run: |
        echo "runner os: ${RUNNER_OS}"
        echo "image os: ${ImageOS:-}"
        echo "image version: ${ImageVersion:-}"
        echo "github event: ${{github.event_name}}"
        echo "github repository: ${{github.repository}}"
        echo "github ref: ${{github.ref}}"
        echo "package feed: ${FEED_URL}"
        if [ -z "${TOKEN}" ]; then
          echo "GH_PACKAGES_TOKEN: empty"
        else
          echo "GH_PACKAGES_TOKEN: present"
        fi
        echo
        echo "cmake from PATH:"
        command -v cmake || true
        cmake --version || true
        echo
        echo "vcpkg submodule:"
        git submodule status vcpkg || true
        ./vcpkg/vcpkg version || true
        echo
        echo "nuget used by vcpkg:"
        vcpkg_nuget="$(./vcpkg/vcpkg fetch nuget | tail -n 1)"
        echo "${vcpkg_nuget}"
        mono "${vcpkg_nuget}" help | grep -i "NuGet Version" || true
        echo
        echo "nuget locals from vcpkg nuget:"
        mono "${vcpkg_nuget}" locals all -list || true
        echo
        echo "sources from vcpkg nuget:"
        mono "${vcpkg_nuget}" sources list -Format Detailed || true
        echo
        echo "sanitized NuGet config files:"
        for config in \
          "${HOME}/.config/NuGet/NuGet.Config" \
          "${HOME}/.nuget/NuGet/NuGet.Config"; do
          if [ -f "${config}" ]; then
            echo "${config}"
            sed -E '/password|apikey/I d' "${config}" || true
          fi
        done
        echo
        echo "feed probe with basic auth:"
        curl -sS -D "${RUNNER_TEMP}/feed-basic-headers.txt" -o "${RUNNER_TEMP}/feed-basic.json" -w "feed basic http status: %{http_code}\n" -u "${{github.repository_owner}}:${TOKEN}" "${FEED_URL}" || true
        cat "${RUNNER_TEMP}/feed-basic-headers.txt" || true
        if [ -f "${RUNNER_TEMP}/feed-basic.json" ]; then
          wc -c "${RUNNER_TEMP}/feed-basic.json"
        fi
        echo
        echo "feed probe with bearer auth:"
        curl -sS -D "${RUNNER_TEMP}/feed-bearer-headers.txt" -o "${RUNNER_TEMP}/feed-bearer.json" -w "feed bearer http status: %{http_code}\n" -H "Authorization: Bearer ${TOKEN}" "${FEED_URL}" || true
        cat "${RUNNER_TEMP}/feed-bearer-headers.txt" || true
        if [ -f "${RUNNER_TEMP}/feed-bearer.json" ]; then
          wc -c "${RUNNER_TEMP}/feed-bearer.json"
        fi
        echo
        echo "package list probe:"
        mono "${vcpkg_nuget}" list vcpkg-cmake-config -Source "${FEED_URL}" -NonInteractive -Verbosity detailed || true

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Verify prebuilt documentation
      run: >
        cmake -E sha256sum
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.html
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.pdf

    - name: Run Workflow Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      env:
        VCPKG_BINARY_SOURCES: "clear;nuget,${{env.FEED_URL}},readwrite"
      run: xvfb-run -a cmake --workflow --preset ci-${{matrix.preset}}

    - name: Run Workflow
      if: ${{matrix.os != 'ubuntu-latest'}}
      env: 
        VCPKG_BINARY_SOURCES: "clear;nuget,${{env.FEED_URL}},readwrite"
      run: cmake --workflow --preset ci-${{matrix.preset}}

    - name: Dump vcpkg NuGet artifacts Windows
      if: ${{always() && matrix.os == 'windows-2022'}}
      shell: cmd
      run: |
        @echo off
        echo vcpkg restore request:
        if exist vcpkg\buildtrees\packages.config (
          type vcpkg\buildtrees\packages.config
        ) else (
          echo vcpkg\buildtrees\packages.config not found
        )
        echo.
        echo nupkg files under vcpkg buildtrees:
        dir /s /b vcpkg\buildtrees\*.nupkg 2>NUL
        echo.
        echo nuspec files under vcpkg buildtrees:
        dir /s /b vcpkg\buildtrees\*.nuspec 2>NUL
        echo.
        echo NuGet related lines from vcpkg buildtrees logs:
        findstr /S /I /C:"NuGet" /C:"Pushing" /C:"Authentication" /C:"Unauthorized" /C:"Forbidden" /C:"failed" vcpkg\buildtrees\*.log 2>NUL
        exit /b 0

    - name: Dump vcpkg NuGet artifacts Linux
      if: ${{always() && matrix.os == 'ubuntu-latest'}}
      shell: bash
      run: |
        echo "vcpkg restore request:"
        if [ -f vcpkg/buildtrees/packages.config ]; then
          cat vcpkg/buildtrees/packages.config
        else
          echo "vcpkg/buildtrees/packages.config not found"
        fi
        echo
        echo "nupkg files under vcpkg buildtrees:"
        find vcpkg/buildtrees -name '*.nupkg' -print 2>/dev/null || true
        echo
        echo "nuspec files under vcpkg buildtrees:"
        find vcpkg/buildtrees -name '*.nuspec' -print 2>/dev/null || true
        echo
        echo "NuGet related lines from vcpkg buildtrees logs:"
        grep -RInE 'NuGet|Pushing|Authentication|Unauthorized|Forbidden|failed' vcpkg/buildtrees --include='*.log' || true

    - name: Build Setup package
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      run: cmake --build --preset ci-${{matrix.preset}} --target setup

    - name: Upload setup package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Setup-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*-Setup.exe
        if-no-files-found: error
        compression-level: 0

    - name: Upload msi package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Msi-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.msi
        if-no-files-found: error
        compression-level: 0

    - name: Upload zip package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Zip-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.zip
        if-no-files-found: error
        compression-level: 0

    - name: Upload tar.gz package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'ubuntu-latest' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Tar-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.tar.gz
        if-no-files-found: error
        compression-level: 0

  # When a tag is pushed, create a draft release from the build assets
  release:
    if: ${{github.event_name == 'push' && github.ref_type == 'tag'}}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download setup package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*-Setup.exe"
          merge-multiple: true
          skip-decompress: true

      - name: Download msi package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.msi"
          merge-multiple: true
          skip-decompress: true

      - name: Download tar.gz package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.tar.gz"
          merge-multiple: true
          skip-decompress: true

      - name: Download zip package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.zip"
          merge-multiple: true
          skip-decompress: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{github.token}}
          TAG: ${{github.ref_name}}
        run: |
          ls -lR release-assets
          compgen -G "release-assets/*-Setup.exe" > /dev/null
          compgen -G "release-assets/*.msi" > /dev/null
          compgen -G "release-assets/*.tar.gz" > /dev/null
          compgen -G "release-assets/*.zip" > /dev/null
          gh release create "$TAG" \
            release-assets/* \
            --draft \
            --title "Version $TAG" \
            --notes-from-tag

  #############################################################################
  wx:
    if: ${{needs.wx_changes.outputs.run_wx == 'true'}}
    needs: [ html-docs, pdf-docs, wx_changes ]
    strategy:
      matrix:
        preset: [ wx-debug, wx-release ]
        # macos-latest is disabled for now
        os: [ ubuntu-latest, windows-2022 ]
        include:
          #- os: macos-latest
          #  nuget: mono `./vcpkg/vcpkg fetch nuget | tail -n 1`
          - os: ubuntu-latest
            nuget: mono `./vcpkg/vcpkg fetch nuget | tail -n 1`
          - os: windows-2022
            nuget: nuget

    runs-on: ${{matrix.os}}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get prebuilt HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Get prebuilt PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Install Prerequisites Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh
        echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
        sudo dpkg-reconfigure man-db
        sudo apt-get update
        sed 's/#.*//' ${{github.workspace}}/.github/workflows/wx-requirements.txt | xargs sudo apt-get install 

    #- name: Install Prerequisites macOS
    #  if: ${{matrix.os == 'macos-latest'}}
    #  shell: bash
    #  run: |
    # ${{github.workspace}}/vcpkg/bootstrap-vcpkg.sh

    - name: Add NuGet sources
      shell: bash
      run: |
        ${{matrix.nuget}} \
          sources add \
          -Source "${{env.FEED_URL}}" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "${{github.repository_owner}}" \
          -Password "${{secrets.GH_PACKAGES_TOKEN}}"
        ${{matrix.nuget}} \
          setapikey "${{secrets.GH_PACKAGES_TOKEN}}" \
          -Source "${{env.FEED_URL}}"

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Verify prebuilt documentation
      run: >
        cmake -E sha256sum
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.html
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.pdf

    - name: Run Workflow
      env: 
        VCPKG_BINARY_SOURCES: "clear;nuget,${{env.FEED_URL}},readwrite"
      run: cmake --workflow --preset ci-${{matrix.preset}}

    - name: Build Setup package
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'wx-release'}}
      run: cmake --build --preset ci-${{matrix.preset}} --target setup


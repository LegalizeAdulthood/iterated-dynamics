name: build

on:
  push:
    branches: [ "master", "develop", "id-*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master", "id-*" ]

permissions:
  contents: read

jobs:
  #############################################################################
  ascii-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Setup ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7

    - name: Setup AsciiDoctor
      uses: reitzig/actions-asciidoctor@fc32dc82a65a0e93b67383531d4c68cec34c7f27 # v2.0.4
      with:
        version: 2.0.18

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Setup vcpkg package cache
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@4305d9f202bf0131458407402f0cc7efc3412394 # v1.1.0
      with:
        token: ${{github.token}}
        bootstrap: "true"
        install-nuget: "true"
        debug: "false"
        trace: "false"

    - name: Run Workflow
      shell: pwsh
      run: |
        cmake --version
        cmake --workflow --preset ci-ascii-doc 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@4305d9f202bf0131458407402f0cc7efc3412394 # v1.1.0
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{github.run_attempt}}
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Copy images for AsciiDoc artifact
      run: |
        if [ -d "hc/src/images" ]; then
          mkdir -p build-ci-ascii-doc/hc/src/help/images
          cp -r hc/src/images/* build-ci-ascii-doc/hc/src/help/images/
        fi

    - name: Upload AsciiDoc artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ascii-doc
        path: |
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.adoc
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/help/images/

  #############################################################################
  pdf-docs:
    needs: ascii-doc
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get AsciiDoc artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ascii-doc
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/

    - name: Run AsciiDoctor PDF
      run: |
        docker run --rm \
          -v ${{github.workspace}}/build-ci-ascii-doc/hc/src:/documents \
          docker.io/asciidoctor/docker-asciidoctor:latest \
          asciidoctor-pdf \
          --require asciidoctor-mathematical \
          --attribute stem=asciimath \
          --attribute mathematical-format=svg \
          --attribute allow-uri-read \
          /documents/id.adoc

    - name: Upload PDF artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.pdf

  #############################################################################
  html-docs:
    needs: ascii-doc
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get AsciiDoc artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ascii-doc
        path: ${{github.workspace}}/build-ci-ascii-doc/hc/src/

    - name: Setup ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 2.7

    - name: Setup AsciiDoctor
      uses: reitzig/actions-asciidoctor@fc32dc82a65a0e93b67383531d4c68cec34c7f27 # v2.0.4
      with:
        version: 2.0.18

    - name: Run AsciiDoctor
      run: |
        asciidoctor --version
        asciidoctor build-ci-ascii-doc/hc/src/id.adoc

    - name: Upload HTML artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: html-docs
        path: |
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/id.html
          ${{github.workspace}}/build-ci-ascii-doc/hc/src/help/images/

  #############################################################################
  master-docs:
    if: ${{github.event_name == 'push' && github.ref == 'refs/heads/master'}}
    needs: [ html-docs, pdf-docs ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: master-docs
      cancel-in-progress: false

    steps:
    - name: Download HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: docs/html

    - name: Download PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: docs/pdf

    - name: Checkout Pages
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        ref: gh-pages
        submodules: false
        path: pages

    - name: Publish Master Documentation
      run: |
        test -f docs/html/id.html
        test -f docs/pdf/id.pdf
        rm -rf pages/master
        install -D docs/html/id.html pages/master/index.html
        install -D docs/pdf/id.pdf pages/master/id.pdf
        if [ -d docs/html/help ]; then
          cp -R docs/html/help pages/master/help
        fi

    - name: Update Contents
      working-directory: pages
      run: |
        git config user.name github-pages
        git config user.email pages-bot@example.com
        git add -A .
        git status
        git commit -m "Publish master online documentation" || echo "No changes to commit"
        git log -n 1

    - name: Push Updates
      working-directory: pages
      run: git push origin gh-pages

  #############################################################################
  wx-changes:
    runs-on: ubuntu-latest
    outputs:
      run-wx: ${{steps.changed_files.outputs.run-wx}}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: false

    - name: Check for wx changes
      id: changed_files
      env:
        BEFORE: ${{github.event.before}}
        HEAD: ${{github.sha}}
        PR_BASE: ${{github.event.pull_request.base.sha}}
        REF_TYPE: ${{github.ref_type}}
      run: |
        run_wx=false
        mode=tag
        base=""
        changed_files=""
        include_roots=(
          wx
          wx/include
          libid/include
          config/include
          algos/include
          helpcom/include
          hc
        )

        resolve_include() {
          local source="$1"
          local include="$2"
          local source_dir
          local root
          local candidate
          source_dir="$(dirname "$source")"
          for candidate in "$source_dir/$include"; do
            candidate="$(printf "%s\n" "$candidate" | sed "s#^\./##;s#//*#/#g")"
            if git cat-file -e "$HEAD:$candidate" 2>/dev/null; then
              printf "%s\n" "$candidate"
              return 0
            fi
          done
          for root in "${include_roots[@]}"; do
            candidate="$root/$include"
            candidate="$(printf "%s\n" "$candidate" | sed "s#^\./##;s#//*#/#g")"
            if git cat-file -e "$HEAD:$candidate" 2>/dev/null; then
              printf "%s\n" "$candidate"
              return 0
            fi
          done
          return 1
        }

        collect_headers_for() {
          local source="$1"
          local includes
          local include
          local header
          includes="$(git show "$HEAD:$source" 2>/dev/null |
            sed -n 's/^[[:space:]]*#[[:space:]]*include[[:space:]]*[<"]\([^>"]*\)[>"].*/\1/p' ||
            true)"
          while IFS= read -r include; do
            if [ -z "$include" ]; then
              continue
            fi
            header="$(resolve_include "$source" "$include" || true)"
            if [ -n "$header" ] && ! grep -Fxq "$header" "$wx_header_list"; then
              printf "%s\n" "$header" >> "$wx_header_list"
              collect_headers_for "$header"
            fi
          done <<< "$includes"
        }

        collect_wx_headers() {
          local source
          local wx_sources
          wx_header_list="$(mktemp)"
          wx_sources="$(git ls-tree -r --name-only "$HEAD" wx |
            grep -E '^wx/[^/]+[.]cpp$' ||
            true)"
          while IFS= read -r source; do
            if [ -n "$source" ]; then
              collect_headers_for "$source"
            fi
          done <<< "$wx_sources"
          sort -u "$wx_header_list"
        }

        if [ "$REF_TYPE" != "tag" ]; then
          mode=diff
          base="$BEFORE"
          if [ -n "$PR_BASE" ]; then
            base="$PR_BASE"
            mode=pull-request
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            mode=full-tree
            changed_files="$(git ls-tree -r --name-only "$HEAD")"
          elif git cat-file -e "$base^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$base" "$HEAD")"
          else
            mode=missing-base
            echo "::warning::Base commit $base is unavailable; assuming wx changed"
            run_wx=true
          fi
          if [ "$run_wx" != "true" ]; then
            wx_headers="$(collect_wx_headers)"
            wx_header_count="$(printf "%s\n" "$wx_headers" | sed '/^$/d' | wc -l)"
            echo "wx-changes header-count=$wx_header_count"
            for path in $changed_files; do
              case "$path" in
                wx/*)
                  echo "wx-changes matched-wx-path=$path"
                  run_wx=true
                  break
                  ;;
                .github/workflows/wx-requirements.txt)
                  echo "wx-changes matched-wx-requirements=$path"
                  run_wx=true
                  break
                  ;;
              esac
              if printf "%s\n" "$wx_headers" | grep -Fxq "$path"; then
                echo "wx-changes matched-wx-header=$path"
                run_wx=true
                break
              fi
              if git grep -q "ID_USE_WX" "$HEAD" -- "$path" 2>/dev/null; then
                echo "wx-changes matched-head-id-use-wx=$path"
                run_wx=true
                break
              fi
              if [ -n "$base" ] && ! [[ "$base" =~ ^0+$ ]] &&
                  git grep -q "ID_USE_WX" "$base" -- "$path" 2>/dev/null; then
                echo "wx-changes matched-base-id-use-wx=$path"
                run_wx=true
                break
              fi
            done
          fi
        fi
        echo "wx-changes base=$base"
        echo "wx-changes head=$HEAD"
        echo "wx-changes mode=$mode"
        echo "wx-changes run-wx=$run_wx"
        echo "<h3>Build wx: $run_wx</h3>" >> "$GITHUB_STEP_SUMMARY"
        echo "run-wx=$run_wx" >> "$GITHUB_OUTPUT"

  #############################################################################
  build:
    needs: [ html-docs, pdf-docs ]
    strategy:
      matrix:
        preset: [ debug, release ]
        os: [ ubuntu-latest, windows-2022, macos-latest ]

    runs-on: ${{matrix.os}}
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get prebuilt HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Get prebuilt PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Verify prebuilt documentation
      run: >
        cmake -E sha256sum
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.html
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.pdf

    - name: Install Prerequisites Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
        sudo dpkg-reconfigure man-db
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y libx11-dev xauth xvfb

    - name: Install Prerequisites macOS
      if: ${{matrix.os == 'macos-latest'}}
      shell: bash
      run: brew install autoconf automake libtool pkg-config

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Setup vcpkg package cache
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@4305d9f202bf0131458407402f0cc7efc3412394 # v1.1.0
      with:
        token: ${{github.token}}
        bootstrap: "true"
        install-nuget: "true"
        debug: "false"
        trace: "false"

    - name: Run Workflow Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      shell: pwsh
      run: |
        xvfb-run -a cmake --workflow --preset ci-${{matrix.preset}} 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Run Workflow Windows
      if: ${{matrix.os == 'windows-2022'}}
      shell: pwsh
      run: |
        cmake --workflow --preset ci-${{matrix.preset}} 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Run Workflow macOS
      if: ${{matrix.os == 'macos-latest'}}
      shell: pwsh
      run: |
        cmake --workflow --preset ci-macos-${{matrix.preset}} 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@4305d9f202bf0131458407402f0cc7efc3412394 # v1.1.0
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{matrix.os}}-${{matrix.preset}}-${{github.run_attempt}}
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Build Setup package
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      run: cmake --build --preset ci-${{matrix.preset}} --target setup

    - name: Upload setup package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Setup-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*-Setup.exe
        if-no-files-found: error
        compression-level: 0

    - name: Upload msi package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Msi-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.msi
        if-no-files-found: error
        compression-level: 0

    - name: Upload zip package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Zip-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.zip
        if-no-files-found: error
        compression-level: 0

    - name: Upload tar.gz package artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: ${{matrix.os == 'ubuntu-latest' && matrix.preset == 'release'}}
      with:
        archive: false
        name: Tar-${{matrix.preset}}
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*.tar.gz
        if-no-files-found: error
        compression-level: 0

  #############################################################################
  # When a tag is pushed, create a draft release from the build assets
  release:
    if: ${{github.event_name == 'push' && github.ref_type == 'tag'}}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download setup package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*-Setup.exe"
          merge-multiple: true
          skip-decompress: true

      - name: Download msi package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.msi"
          merge-multiple: true
          skip-decompress: true

      - name: Download tar.gz package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.tar.gz"
          merge-multiple: true
          skip-decompress: true

      - name: Download zip package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: "Iterated Dynamics-*.zip"
          merge-multiple: true
          skip-decompress: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{github.token}}
          TAG: ${{github.ref_name}}
        run: |
          ls -lR release-assets
          compgen -G "release-assets/*-Setup.exe" > /dev/null
          compgen -G "release-assets/*.msi" > /dev/null
          compgen -G "release-assets/*.tar.gz" > /dev/null
          compgen -G "release-assets/*.zip" > /dev/null
          gh release create "$TAG" \
            release-assets/* \
            --draft \
            --title "Version $TAG" \
            --notes-from-tag

  #############################################################################
  wx:
    if: ${{needs.wx-changes.outputs.run-wx == 'true'}}
    needs: [ html-docs, pdf-docs, wx-changes ]
    strategy:
      matrix:
        preset: [ wx-debug, wx-release ]
        # macos-latest is disabled for now
        os: [ ubuntu-latest, windows-2022 ]

    runs-on: ${{matrix.os}}
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        submodules: true

    - name: Get prebuilt HTML documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: html-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Get prebuilt PDF documentation
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: pdf-docs
        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src

    - name: Verify prebuilt documentation
      run: >
        cmake -E sha256sum
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.html
        ${{github.workspace}}/build-ci-${{matrix.preset}}/hc/src/id.pdf

    - name: Install Prerequisites Linux
      if: ${{matrix.os == 'ubuntu-latest'}}
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "man-db man-db/auto-update boolean false" | sudo debconf-set-selections
        sudo dpkg-reconfigure man-db
        sudo apt-get update
        sed 's/#.*//' ${{github.workspace}}/.github/workflows/wx-requirements.txt | xargs sudo apt-get install 

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
      with:
        cmake-version: '3.31'

    - name: Setup vcpkg package cache
      id: vc
      uses: LegalizeAdulthood/vcpkg-github-cache@4305d9f202bf0131458407402f0cc7efc3412394 # v1.1.0
      with:
        token: ${{github.token}}
        bootstrap: "true"
        install-nuget: "true"
        debug: "false"
        trace: "false"

    - name: Run Workflow
      shell: pwsh
      run: |
        cmake --workflow --preset ci-${{matrix.preset}} 2>&1 |
          Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: Analyze vcpkg package cache
      if: always()
      uses: LegalizeAdulthood/vcpkg-github-cache/analyze@4305d9f202bf0131458407402f0cc7efc3412394 # v1.1.0
      with:
        token: ${{github.token}}
        build-log: build.log
        artifact-name: vcpkg-cache-diagnostics-${{github.workflow}}-${{github.job}}-${{matrix.os}}-${{matrix.preset}}-${{github.run_attempt}}
        fail-on: "never"
        debug: "false"
        trace: "false"

    - name: Build Setup package
      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'wx-release'}}
      run: cmake --build --preset ci-${{matrix.preset}} --target setup

#    - name: Upload setup package artifacts
#      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
#      if: ${{matrix.os == 'windows-2022' && matrix.preset == 'wx-release'}}
#      with:
#        archive: false
#        name: Setup-${{matrix.preset}}
#        path: ${{github.workspace}}/build-ci-${{matrix.preset}}/*-Setup.exe
#        compression-level: 0
